<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Watchfire</title>
  <link rel="icon" type="image/png" href="watchfire-logo.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #1a2332;
      --bg-row: #22303f;
      --bg-row-hover: #2a3a4d;
      --bg-title: #15202c;
      --text: #e8e8e8;
      --text-dim: #7a8a9a;
      --text-muted: #5a6a7a;
      --border: #2c3a4d;

      --status-working:  #ffd166;
      --status-waiting:  #ef476f;
      --status-done:     #06d6a0;
      --status-idle:     #6c7a89;

      --agent-claude: #a64633;
      --agent-codex:  #3a7a8a;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      overflow: hidden;
    }
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      /* Default content zoom — bumps everything (rows, badges, tooltip) ~15%. */
      zoom: 1.15;
    }

    .scroll {
      /* `scroll` (not `auto`) so the track is always reserved + visible —
         users complained the thin webkit thumb was easy to miss when content
         only barely overflowed. */
      overflow-y: scroll;
      flex: 1;
      padding: 6px 0 8px;
    }
    /* Panel visibility per mode (full | mini | history). Default = full. */
    body:not(.mode-mini):not(.mode-history) .scroll { display: block; }
    body.mode-mini    .scroll  { display: none; }
    body.mode-history .scroll  { display: none; }

    /* Mode bar — three-button segment control top-right. The active mode
       has a brighter foreground + slightly inset background. */
    .modebar {
      position: fixed;
      top: 4px;
      right: 6px;
      z-index: 50;
      display: flex;
      gap: 1px;
      user-select: none;
    }
    .mode-btn {
      width: 20px; height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 11px;
      border-radius: 3px;
      background: transparent;
      border: 0;
    }
    .mode-btn:hover { background: var(--bg-row-hover); color: var(--text); }
    .mode-btn.active { background: var(--bg-row); color: var(--text); }

    /* Mini bar — two stacked rows:
         row 1: waiting sessions (clickable, jumps to that WT tab)
         row 2: running/done counts
       idle is intentionally not surfaced — at this density the user only
       cares about who needs attention and how much is in flight. */
    .mini-bar {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      padding: 8px 30px 8px 10px;  /* right padding leaves space for toggle */
      font-size: 11px;
      color: var(--text);
      line-height: 1.2;
      overflow: hidden;
      min-height: 56px;
      box-sizing: border-box;
    }
    body.mode-mini .mini-bar { display: flex; flex: 1; }
    body.mode-mini html, body.mode-mini { overflow: hidden; }

    .mini-waiting-row, .mini-counts-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      align-items: center;
      white-space: nowrap;
    }
    .mini-waiting {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      padding: 1px 5px;
      border-radius: 3px;
      max-width: 100%;
    }
    .mini-waiting:hover { background: var(--bg-row-hover); }
    .mini-waiting .name {
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .mini-empty { color: var(--text-muted); font-style: italic; }

    .mini-count { display: inline-flex; align-items: center; gap: 5px; color: var(--text-dim); }
    .mini-count.zero { display: none; }   /* hide stat lines that are 0 */
    .mini-count .dot { width: 8px; height: 8px; animation: none !important; }
    .mini-count .n { color: var(--text); font-weight: 600; }
    .scroll::-webkit-scrollbar { width: 8px; }
    .scroll::-webkit-scrollbar-track { background: transparent; }
    .scroll::-webkit-scrollbar-thumb {
      background: #4a5a70;          /* brighter than bg so it's visible */
      border-radius: 4px;
      border: 1px solid #2c3a4d;
    }
    .scroll::-webkit-scrollbar-thumb:hover { background: #5a6a82; }

    .group { padding: 6px 10px 0; }
    .group-header {
      color: var(--text-dim);
      font-size: 10px;
      padding: 2px 0 4px;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }
    .g-toggle { flex: 1; cursor: pointer; }
    .g-toggle:hover { color: var(--text); }
    .g-count {
      color: var(--text-muted);
      cursor: pointer;
      padding: 0 5px;
      border-radius: 3px;
    }
    .g-count:hover { background: var(--bg-row); color: var(--text); }
    .g-count.open { background: var(--bg-row-hover); color: var(--text); }

    /* Chats popup: list of every transcript ever in this cwd.
       Active and inactive rows share dot size (7px), font size (10px),
       and layout — only the colors differ. */
    .chat-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin: 3px 0;
      font-size: 10px;
    }
    .chat-row .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .chat-row .name {
      flex: 1; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .chat-row .state { color: var(--text-dim); font-size: 10px; }
    .chat-row.inactive .name  { color: #b0bcc8; }   /* a bit dimmer than active */
    .chat-row.inactive .state { color: #8896a4; }

    .row {
      display: grid;
      grid-template-columns: 22px 14px 1fr auto;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      margin-bottom: 4px;
      background: var(--bg-row);
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: pointer;
    }
    .row:hover { background: var(--bg-row-hover); }
    .row.waiting { border-color: rgba(239,71,111,0.7); }

    .badge {
      width: 18px; height: 18px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .badge.claude { background: var(--agent-claude); }
    .badge.codex  { background: var(--agent-codex); }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--status-idle);
    }
    .dot.working       { background: var(--status-working); }
    .dot.waiting_input { background: var(--status-waiting); animation: pulse 1.4s ease-in-out infinite; }
    .dot.done          { background: var(--status-done); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    .body { min-width: 0; line-height: 1.2; }
    .body .name {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .body .meta {
      font-size: 9px;
      color: var(--text-muted);
    }
    .body .meta .working       { color: var(--status-working); }
    .body .meta .waiting_input { color: var(--status-waiting); }
    .body .meta .done          { color: var(--status-done); }
    .body .meta .idle          { color: var(--status-idle); }

    .ctx { text-align: right; line-height: 1.2; min-width: 36px; }
    .ctx .pct { font-size: 10px; color: var(--text); }
    .ctx .pct.warn   { color: #f39c12; font-weight: bold; }
    .ctx .pct.danger { color: var(--status-waiting); font-weight: bold; }
    .ctx .lim { font-size: 9px; color: var(--text-muted); }

    /* Tooltip */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #0c141c;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      /* Stable width — viewport-relative caused horizontal shrinkage as cursor
         moved (text re-wraps when max-width changes). */
      width: 240px;
      box-sizing: border-box;
      max-height: 45vh;
      overflow: hidden;
      font-size: 10px;
      display: none;
      z-index: 100;
    }
    #tooltip .prompt {
      /* Hard truncate after a few lines so the tooltip can't grow tall. */
      display: -webkit-box;
      -webkit-line-clamp: 8;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #tooltip .head { font-weight: bold; color: var(--text); margin-bottom: 2px; }
    #tooltip .sub  { color: var(--text-dim); font-size: 9px; margin-bottom: 6px; }
    #tooltip .lbl  { color: var(--text-dim); font-size: 9px; margin-top: 6px; }
    #tooltip .prompt { color: var(--text); white-space: pre-wrap; word-wrap: break-word; }
    #tooltip .cwd  { color: var(--text-muted); font-size: 9px; margin-top: 8px; }

    .empty {
      color: var(--text-muted);
      text-align: center;
      padding: 40px 20px;
      font-size: 11px;
    }

    /* History view ------------------------------------------------------- */
    .history { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    body.mode-history .history { display: flex; }

    .history-toolbar {
      display: flex;
      gap: 4px;
      padding: 6px 30px 6px 10px;   /* right pad for the modebar */
      font-size: 10px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
    .hs-toggle {
      padding: 2px 8px;
      cursor: pointer;
      border-radius: 3px;
      background: transparent;
      border: 0;
      color: var(--text-dim);
      font: inherit;
    }
    .hs-toggle:hover  { background: var(--bg-row-hover); color: var(--text); }
    .hs-toggle.active { background: var(--bg-row); color: var(--text); }

    .history-body { overflow-y: scroll; flex: 1; padding: 6px 0 8px; }
    .history-body::-webkit-scrollbar { width: 8px; }
    .history-body::-webkit-scrollbar-track { background: transparent; }
    .history-body::-webkit-scrollbar-thumb {
      background: #4a5a70; border-radius: 4px; border: 1px solid #2c3a4d;
    }

    .hist-group { padding: 4px 10px 0; }
    .hist-group-header {
      color: var(--text-dim);
      font-size: 10px;
      padding: 2px 0 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .hist-group-header:hover .hg-toggle { color: var(--text); }
    .hg-meta { color: var(--text-muted); }

    .hist-bucket { padding: 0 10px; }
    .hist-bucket-header {
      color: var(--text-dim);
      font-size: 10px;
      padding: 8px 0 4px;
      user-select: none;
    }
    .hb-count { color: var(--text-muted); }

    .hist-row {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      margin-bottom: 2px;
      background: var(--bg-row);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    .hist-row:hover { background: var(--bg-row-hover); }
    .hist-row .badge { width: 18px; height: 18px; }
    .hist-body {
      min-width: 0; line-height: 1.2;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .hist-body .name {
      color: var(--text);
      overflow: hidden; text-overflow: ellipsis;
    }
    .hist-cwd { color: var(--text-muted); font-size: 9px; }
    .hist-ago { color: var(--text-dim); font-size: 10px; }
  </style>
</head>
<body>
  <div class="mini-bar" id="miniBar"></div>
  <div class="scroll" id="scroll"></div>
  <div class="history" id="history">
    <div class="history-toolbar">
      <button class="hs-toggle" data-sort="project">by project</button>
      <button class="hs-toggle" data-sort="time">by time</button>
    </div>
    <div class="history-body" id="historyBody"></div>
  </div>
  <div class="modebar" id="modebar">
    <button class="mode-btn" data-mode="full"    title="Statuses (full list)">▤</button>
    <button class="mode-btn" data-mode="mini"    title="Statuses (mini bar)">─</button>
    <button class="mode-btn" data-mode="history" title="History (all chats)">⏱</button>
  </div>
  <div id="tooltip"></div>
  <script type="module" src="./widget.js"></script>
</body>
</html>
