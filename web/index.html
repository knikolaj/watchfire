<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Watchfire</title>
<link rel="icon" type="image/png" href="space-invader.png" />
<style>
  html, body { margin:0; padding:0; height:100%; background:#1a2332; overflow:hidden;
               font: 13px/1.4 ui-monospace, "JetBrains Mono", monospace; color:#ddd; }
  #game { position:absolute; inset:0; }
  #hud  { position:absolute; left:8px; top:8px; pointer-events:none;
          background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:4px;
          font-size:11px; color:#9ab; }
  #tooltip { position:absolute; pointer-events:none; background:rgba(0,0,0,0.85);
             border:1px solid #456; padding:6px 8px; border-radius:3px; font-size:11px;
             max-width: 360px; display:none; z-index:10; }
  #tooltip .cwd { color:#9ab; }
  #tooltip .msg { color:#ccc; margin-top:4px; white-space:pre-wrap; }
</style>
</head>
<body>
<div id="game"></div>
<div id="hud">watchfire</div>
<div id="tooltip"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script type="module" src="./main.js"></script>
</body>
</html>
