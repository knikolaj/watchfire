<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <rect width="640" height="420" fill="#0e1822"/>

  <defs>
