      <g transform="translate(0,82)">
        <rect width="256" height="28" rx="4" fill="#22303f" stroke="#ef476f" stroke-width="1" stroke-opacity="0.7"/>
        <rect x="6" y="5" width="18" height="18" rx="3" fill="#a64633"/>
