    <text x="12" y="58" fill="#7a8a9a" font-size="9">last prompt:</text>
    <text x="12" y="74" fill="#e8e8e8" font-size="10">«Где мне посмотреть</text>
    <text x="12" y="88" fill="#e8e8e8" font-size="10">название этого диалога?»</text>
    <text x="12" y="128" fill="#5a6a7a" font-size="9">/mnt/c/users/23738</text>
